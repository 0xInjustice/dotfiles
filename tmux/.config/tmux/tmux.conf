# terminal
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -ag terminal-overrides ",xterm-256color:RGB"

# prefix
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# history
set -g history-limit 500000

# splits (cwd aware)
unbind %
bind ";" split-window -h -c "#{pane_current_path}"

unbind '"'
bind "'" split-window -v -c "#{pane_current_path}"

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# new window (cwd aware)
bind c new-window -c "#{pane_current_path}"

# indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# status bar position
set-option -g status-position top

# navigation (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resizing
bind J resize-pane -D 10
bind K resize-pane -U 10
bind H resize-pane -L 10
bind L resize-pane -R 10

# maximize
bind -r m resize-pane -Z

# quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# display pane numbers (temporary overlay)
bind q display-panes

# mouse
set -g mouse on

# vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

##### COLORS — GHOSTTY #####

# base UI
set -g status-style "bg=#0c1a2b,fg=#ffffff"
set -g message-style "bg=#1a2a3f,fg=#ffffff"

# borders (strong active indicator)
set -g pane-border-style "fg=#1a2a3f"
set -g pane-active-border-style "fg=#50fa7b"

# window tabs
set -g window-status-style "bg=#0c1a2b,fg=#dde3ea"
set -g window-status-current-style "bg=#1a2a3f,fg=#ffffff"

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# ACTIVE PANE INDICATOR (top-left)
set -g status-left "#[fg=#50fa7b]#S #[fg=#32a6d5]| #[fg=#8be9fd]#I:#P "

# right side
set -g status-right "#[fg=#50fa7b]%H:%M #[fg=#dde3ea]| #[fg=#8be9fd]%Y-%m-%d"

# selection / copy mode
set -g mode-style "bg=#1a2a3f,fg=#ffffff"

# clock
set -g clock-mode-colour "#50fa7b"

##### PALETTE (REFERENCE) #####

set -g @fg "#ffffff"
set -g @bg "#0c1a2b"

set -g @black "#0c1a2b"
set -g @red "#ff3b3b"
set -g @green "#50fa7b"
set -g @yellow "#af46f5"
set -g @blue "#32a6d5"
set -g @magenta "#9ea3f3"
set -g @cyan "#8be9fd"
set -g @white "#dde3ea"

set -g @bright_black "#1a2a3f"
set -g @bright_red "#ff5c5c"
set -g @bright_green "#69ff94"
set -g @bright_yellow "#c77dff"
set -g @bright_blue "#5ccfe6"
set -g @bright_magenta "#b3b8ff"
set -g @bright_cyan "#a4ffff"
set -g @bright_white "#ffffff"

##### TPM #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'

# passthrough (yazi images)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

run '~/.config/tmux/plugins/tpm/tpm'
